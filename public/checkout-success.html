<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed - H.U.B</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Exo+2:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#07091c;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#0d1120;border:1px solid rgba(26,110,232,0.2);border-radius:20px;padding:48px 40px;text-align:center;max-width:480px;width:100%;box-shadow:0 4px 40px rgba(0,0,0,0.4)}
    .check{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#1255c0,#1a6ee8,#38bdf8);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2rem;color:#fff}
    h1{font-family:'Exo 2',sans-serif;font-size:1.8rem;font-weight:800;color:#f1f5f9;margin-bottom:12px;letter-spacing:0.5px}
    p{color:#94a3b8;font-size:0.95rem;line-height:1.65;margin-bottom:24px}
    .btn{display:inline-block;padding:13px 32px;background:linear-gradient(135deg,#1255c0,#1a6ee8,#38bdf8);color:#fff;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.88rem;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;transition:all .3s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(26,110,232,0.35)}
    .links{margin-top:20px;font-size:0.85rem}
    .links a{color:#1a6ee8;font-weight:600;text-decoration:none;margin:0 8px}
    .links a:hover{color:#60a5fa}
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your purchase! Your payment has been received. We'll process your order right away. Check your email for the receipt.</p>
    <a href="/" class="btn">Back to H.U.B</a>
    <div class="links">
      <a href="https://www.facebook.com/HUBValenzuela" target="_blank">Message us on Facebook</a>
    </div>
  </div>
</body>
</html>
